# SonarCloud configuration — Phase 7 task 6.
#
# Quality gate: "Sonar way" (the default) plus the per-project
# overrides documented inline below. The CI workflow's sonarcloud
# job aggregates coverage profiles (unit + integration + e2e)
# under coverage/ and points sonar-scanner at them via the
# `go.coverage.reportPaths` property.

sonar.organization = afbora
sonar.projectKey   = afbora_event-driven-notification
sonar.projectName  = Event-Driven Notification System

# --- Sources ----------------------------------------------------
# Production code lives under cmd/ and internal/.
sonar.sources = cmd,internal
sonar.tests   = cmd,internal,tests

# Test discovery — Go convention is `*_test.go`.
sonar.test.inclusions = **/*_test.go

# Exclusions:
#   - generated files (oapi-codegen, sqlc — these are not human-written)
#   - the embedded openapi.yaml copy under internal/adapters/http/
#   - vendored / cache directories the CI runner may have populated
sonar.exclusions = \
  **/*.gen.go, \
  **/sqlc/*.go, \
  internal/adapters/http/openapi.yaml.embed, \
  coverage/**, \
  tmp/**, \
  bin/**

# Per-rule, per-path issue suppressions:
#
#   - S1192 (literal duplicated three or more times) on SQL files:
#     sqlc.arg('row_limit'), sqlc.narg('status'), and similar bindings
#     must appear inline in every LIMIT/WHERE clause that uses them.
#     There is no idiomatic way to extract a "constant" in SQL — these
#     are query parameter labels, not refactorable literals in the
#     sense the rule is meant to catch. Suppressed for **/*.sql; the
#     Go analyzer still applies S1192 to Go source unchanged.
sonar.issue.ignore.multicriteria = e1
sonar.issue.ignore.multicriteria.e1.ruleKey = plsql:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey = **/*.sql

# Coverage exclusions:
#   - cmd/** main packages are wiring code (DI graph assembly). They
#     are exercised indirectly via integration/e2e tests but those
#     tests import the libraries directly rather than spawning the
#     compiled binary, so the cmd/*/main.go lines never show as
#     covered. CLAUDE.md §7 explicitly excludes "framework boilerplate"
#     from the unit-test contract; §4 forbids mocking third-party
#     types like *migrate.Migrate, which is what a unit test for
#     cmd/migrate would require. Excluding from coverage matches the
#     project's baseline (every cmd/* package has been `[no test
#     files]` since project start) without reducing the analysis
#     surface — SonarCloud still flags bugs and code smells here.
sonar.coverage.exclusions = cmd/**

# --- Go --------------------------------------------------------
sonar.go.coverage.reportPaths = coverage/unit.out,coverage/integration.out,coverage/e2e.out

# --- Encoding & branches ---------------------------------------
sonar.sourceEncoding = UTF-8

# --- New code definition ---------------------------------------
# "Number of days" mode is the safest default — anything younger
# than 30 days is considered "new code" and held to the new-code
# quality gate. Override in the SonarCloud UI for release branches.
sonar.newCode.referenceBranch = main
