# Prometheus configuration — Phase 6 task 8.
#
# Three application binaries expose /metrics:
#
#   api         :8080/metrics  (strict-server endpoint, behind the chi chain)
#   worker      :9090/metrics  (separate http.Server, no business endpoints)
#   reconciler  :9090/metrics  (same shape as worker)
#
# Inside the compose network the worker and reconciler containers
# share the metrics port; Prometheus disambiguates them via the
# service hostname. Production deployments scale each tier
# independently, so the scrape configs target service names rather
# than fixed IPs.

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: notification-dev
    environment: docker-compose

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus itself — keeps the meta-metrics (scrape duration,
  # rule evaluation latency) visible in dashboards.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8080']
        labels:
          service: api

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets: ['worker:9090']
        labels:
          service: worker

  - job_name: reconciler
    metrics_path: /metrics
    static_configs:
      - targets: ['reconciler:9090']
        labels:
          service: reconciler

  # AlertManager — surfaces its own delivery metrics so an
  # alerting blackout (e.g. webhook receiver down) is itself
  # alertable.
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
