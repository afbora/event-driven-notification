# Prometheus configuration — phase 1 skeleton.
# Scrape jobs for api / worker / reconciler land here in phase 6 (Task 8 of PLAN.md).
# Until then this self-scrape keeps the binary happy so docker-compose stays green.

global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
